<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="apcu-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6EE7B7"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="apcu-chip" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#d1fae5" stop-opacity="0.85"/>
    </linearGradient>
    <filter id="apcu-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#065f46" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" ry="14" fill="url(#apcu-bg)" filter="url(#apcu-shadow)"/>

  <!-- CPU/chip body -->
  <rect x="18" y="18" width="28" height="28" rx="4" ry="4" fill="url(#apcu-chip)"/>

  <!-- Inner chip core -->
  <rect x="24" y="24" width="16" height="16" rx="2" ry="2" fill="#059669" opacity="0.85"/>

  <!-- Grid lines on core -->
  <line x1="28" y1="24" x2="28" y2="40" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="24" x2="32" y2="40" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="36" y1="24" x2="36" y2="40" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="24" y1="28" x2="40" y2="28" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="24" y1="32" x2="40" y2="32" stroke="#ffffff" stroke-width="1" opacity="0.5"/>
  <line x1="24" y1="36" x2="40" y2="36" stroke="#ffffff" stroke-width="1" opacity="0.5"/>

  <!-- Left pins -->
  <rect x="13" y="22" width="5" height="2.5" rx="1" fill="#ffffff" opacity="0.9"/>
  <rect x="13" y="27" width="5" height="2.5" rx="1" fill="#ffffff" opacity="0.9"/>
  <rect x="13" y="32" width="5" height="2.5" rx="1" fill="#ffffff" opacity="0.9"/>
  <rect x="13" y="37" width="5" height="2.5" rx="1" fill="#ffffff" opacity="0.9"/>

  <!-- Right pins -->
  <rect x="46" y="22" width="5" height="2.5" rx="1" fill="#ffffff" opacity="0.9"/>
  <rect x="46" y="27" width="5" height="2.5" rx="1" fill="#ffffff" opacity="0.9"/>
  <rect x="46" y="32" width="5" height="2.5" rx="1" fill="#ffffff" opacity="0.9"/>
  <rect x="46" y="37" width="5" height="2.5" rx="1" fill="#ffffff" opacity="0.9"/>

  <!-- Top pins -->
  <rect x="22" y="13" width="2.5" height="5" rx="1" fill="#ffffff" opacity="0.9"/>
  <rect x="27" y="13" width="2.5" height="5" rx="1" fill="#ffffff" opacity="0.9"/>
  <rect x="32" y="13" width="2.5" height="5" rx="1" fill="#ffffff" opacity="0.9"/>
  <rect x="37" y="13" width="2.5" height="5" rx="1" fill="#ffffff" opacity="0.9"/>

  <!-- Bottom pins -->
  <rect x="22" y="46" width="2.5" height="5" rx="1" fill="#ffffff" opacity="0.9"/>
  <rect x="27" y="46" width="2.5" height="5" rx="1" fill="#ffffff" opacity="0.9"/>
  <rect x="32" y="46" width="2.5" height="5" rx="1" fill="#ffffff" opacity="0.9"/>
  <rect x="37" y="46" width="2.5" height="5" rx="1" fill="#ffffff" opacity="0.9"/>
</svg>